# Football AI Configuration for Merged Model Test

# Global execution
device: "cuda" # "cuda", "cpu", or "mps"

# Paths
video:
  input_path: "data/raw/sample_10s.mp4"
  output_dir: "data/outputs/merge_test"

# Model parameters
detection:
  player_model_path: "data/models/football-player-detection.pt"
  pitch_model_path: "data/models/football-pitch-detection.pt"
  ball_model_path: "data/models/football-ball-detection.pt"
  merged_model_path: "data/models/best.pt"
  mode: "merged_model"
  confidence: 0.3
  iou: 0.5
  imgsz: 1280

# Tracker settings
tracking:
  min_consecutive_frames: 3

# Team classification
classification:
  stride: 5 # frame stride for gathering fitting crops

# Referee Role Smoothing
role_smoothing:
  enabled: true
  referee_min_frames: 8
  referee_min_ratio: 0.55
  referee_min_confidence: 0.55
  lock_referee_role: true
  use_color_referee_reid: false

# Manual Role Overrides
role_overrides:
  enabled: true
  referee_track_ids: []
  player_track_ids: []
  goalkeeper_track_ids: []
  ball_track_ids: []

# Debugging & Inspections
debug_tracks: true

# Event & Analytics
analytics:
  radar_opacity: 0.5
  heatmap_opacity: 0.6

# Match Events Detection
match_events:
  pass_velocity_threshold: 15.0
  shot_velocity_threshold_multiplier: 1.8
  ball_trajectory_history_len: 15
  event_cooldown_frames: 60
  possession_proximity_ratio: 0.40

# Commentary
commentary:
  enabled: false
  use_llm_enhancement: false
  llm_model_name: "meta-llama/Meta-Llama-3-8B-Instruct"
  tts_enabled: false
  tts_language: "en"
  display_duration_seconds: 2.5
